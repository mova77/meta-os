# Curated skill-pack registry — consumed by the instance template's scripts/packs.sh
# and by bootstrap-instance's pack-selection step. Contract + curation bar in
# systems/packs.md. Keep entries flat and grep-parsable (name → fields, two-space
# indents): the mount script reads this without a YAML library.
version: 1

packs:
  agile:
    repo: https://github.com/mova77/meta-os-agile-pack
    ref: main
    description: "Scrum harness for an agentic estate: agile-process (backlog/Jira mirror, ceremonies), agile-swarm (multi-lane sprint execution), github-project-management. Extracted from the framework core."
    provenance: first-party
    license: MIT
    status: planned   # flips to available when the extraction lands

  superpowers:
    repo: https://github.com/obra/superpowers
    ref: main
    description: "Well-known third-party Claude Code skill collection (TDD, debugging, planning discipline, and more)."
    provenance: third-party
    license: verify-at-add   # check upstream LICENSE when mounting
    status: available

  anthropic-skills:
    repo: https://github.com/anthropics/skills
    ref: main
    description: "Anthropic's official skill repository — document skills (docx/pdf/pptx/xlsx) and more, in standard SKILL.md folders."
    provenance: third-party   # official upstream: Anthropic
    license: verify-at-add
    status: available

# Candidates awaiting verification before entering the curated list (community
# suggestions; upstream owner/repo, license, and mountable-skill layout must be
# confirmed first — the curation bar in systems/packs.md applies):
#   everything-claude-code (agent harness), ruflo (swarm meta-harness),
#   gstack (role-based orchestration), open-design (UI prototyping toolkit),
#   claude-mem (persistent memory), andrej-karpathy-skills (behavioral guidelines).
# Directories/utilities that are NOT packs (see "Not packs" in systems/packs.md):
#   awesome-claude-skills, awesome-agent-skills, anthropics/claude-cookbooks,
#   modelcontextprotocol/servers, ccusage.
